# LDAP 客户端配置，告诉 libnss-ldap 和 libpam-ldap 去哪里找 LDAP 服务器
base dc=nas,dc=local            # 搜索用户时从这个根节点开始
uri ldap://openldap              # LDAP 服务器地址（openldap 是 docker-compose 里的容器名）
binddn cn=admin,dc=nas,dc=local  # 查询时用这个账号连接 LDAP
bindpw admin123                  # 上面账号的密码
ldap_version 3                   # 使用 LDAP v3 协议
pam_password md5                 # PAM 验证密码时的 hash 方式
